spring.application.name=humapper-backend

# PostGIS connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/humapper}
spring.datasource.username=${DB_USER:humapper}
spring.datasource.password=${DB_PASSWORD:humapper}

# Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:dev-secret-change-me-please-at-least-32-bytes-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Initial coordinator (bootstrap)
admin.email=${ADMIN_EMAIL:admin@example.org}
admin.password=${ADMIN_PASSWORD:changeme-admin-password}

# CORS
app.cors.allowed-origin=${APP_CORS_ORIGIN:http://localhost:5173}