services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_DB=humapper
      - POSTGRES_USER=humapper
      - POSTGRES_PASSWORD=humapper
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humapper -d humapper"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./humapper-backend
    environment:
      - DB_URL=jdbc:postgresql://db:5432/humapper
      - DB_USER=humapper
      - DB_PASSWORD=humapper
      # Override these in production (e.g. via a .env file or your shell environment):
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me-please-at-least-32-bytes-long}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.org}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme-admin-password}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./humapper-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data: